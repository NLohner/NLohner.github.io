<!DOCTYPE html>
    <div class="content">
        <div class="container">
            <div class="wrap inline">

                <div class="center">
                    <img src="assets/Wizard101_logo.png">
                </div>

                <p align="center"><span id="current-date"></span></p>

                <script>
                // Get the element by its ID
                const dateElement = document.getElementById('current-date');
                
                // Inject the localized date string into the element
                dateElement.textContent = new Date().toLocaleDateString();
                </script>

                <audio src="assets/audio/Aquila Atlantea Theme.mp3" preload="auto" controls="true" align="center"></audio>

            </div>
        </div>
    </div>
</html>
